# Compact 16K retrieval with topA=32, topB=32 (baseline)
run_name: retrieval_compact_16k_top32
seed: 42
data_dir: data/synthetic
output_dir: experiments/exp_0_3/retrieval_compact_16k_top32
model:
  type: retrieval
  query_encoder:
    d_model: 256
    n_layers: 2
    n_heads: 4
    d_ff: 1024
    dropout: 0.0
    max_seq_len: 64
  memory:
    num_subkeys: 128
    key_dim: 128
    value_dim: 128
    top_a: 32
    top_b: 32
    top_k: 8
    soft_candidates: false
train:
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 0.0
  epochs: 20
  warmup_steps: 100
  grad_clip: 1.0
  device: auto
  num_negatives: 32
  log_every: 20
  eval_every: 100
