# SAM retrieved-memory with chain-aware retriever
# Only to be used after chain retrieval gates pass.
run_name: sam_retrieved_chain_aware_dense
seed: 42
data_dir: data/synthetic_dense
output_dir: experiments/exp_0_11/sam_chain_aware

model:
  type: sam
  mode: retrieved_memory_external_text_query
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_ff: 1536
  max_seq_len: 128
  dropout: 0.0
  memory_every: 3
  memory_query: tokenwise
  memory_integration: gated_sum
  memory:
    type: retrieved_external
    max_facts: 64
    fact_dim: 256
    num_subkeys: 64
    key_dim: 64
    value_dim: 128
    top_a: 8
    top_b: 8
    top_k: 8
    soft_candidates: false

# Chain-set retriever backend
retriever_backend: chain_set
retriever_checkpoint: experiments/exp_0_11/chain_set_bce/checkpoint.pt
topK: 64

train:
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 3
  warmup_steps: 200
  grad_clip: 1.0
  device: auto
  log_every: 50
  eval_every: 150

eval:
  max_new_tokens: 6
  batch_size: 128
  baselines:
    - core_only
    - random_memory
    - oracle_memory
