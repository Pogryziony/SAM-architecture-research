# Dense overfit: train and validate on the same 100 examples.
# Must achieve >90% accuracy to prove the model pipeline works.
run_name: dense_overfit_100
seed: 42
data_dir: data/synthetic
output_dir: experiments/debug/dense_overfit_100

model:
  type: dense
  d_model: 256
  n_layers: 4
  n_heads: 4
  d_ff: 1024
  dropout: 0.0
  max_seq_len: 128
  open_book: false

train:
  batch_size: 32
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 50
  max_steps: null
  warmup_steps: 50
  grad_clip: 1.0
  device: auto
  fact_injection_ratio: 0.5
  log_every: 10
  eval_every: 50

eval:
  max_new_tokens: 6
  batch_size: 128
