# Compact retrieval: 128 subkeys -> 16,384 slots, ~4781 live (~29% density).
# Should achieve Recall@8 >= 80% since live-slot density is much higher.
run_name: retrieval_compact_16k
seed: 42
data_dir: data/synthetic
output_dir: experiments/exp_0_2/retrieval_compact_16k

model:
  type: retrieval
  query_encoder:
    d_model: 256
    n_layers: 2
    n_heads: 4
    d_ff: 1024
    dropout: 0.0
    max_seq_len: 64
  memory:
    num_subkeys: 128        # 16,384 slots (~29% live density)
    key_dim: 128
    value_dim: 128
    top_a: 32
    top_b: 32
    top_k: 8                # retrieve top 8 for evaluation
    soft_candidates: false

train:
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 0.0
  epochs: 15
  max_steps: null
  warmup_steps: 100
  grad_clip: 1.0
  device: auto
  num_negatives: 32
  log_every: 20
  eval_every: 100
