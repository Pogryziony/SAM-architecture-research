# SAM chain-set oracle-filter diagnostic — topK=8
run_name: sam_chain_oracle_filter_top8_dense
seed: 42
data_dir: data/synthetic_dense
output_dir: experiments/exp_0_12/chain_oracle_filter_top8

model:
  type: sam
  mode: retrieved_memory_external_text_query
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_ff: 1536
  max_seq_len: 128
  dropout: 0.0
  memory_every: 3
  memory_query: tokenwise
  memory_integration: gated_sum
  memory:
    type: retrieved_external
    max_facts: 64
    fact_dim: 256
    num_subkeys: 64
    key_dim: 64
    value_dim: 128
    top_a: 8
    top_b: 8
    top_k: 8
    soft_candidates: false

retriever_backend: chain_set
retriever_checkpoint: experiments/exp_0_11/chain_set_bce/checkpoint.pt
topK: 8
memory_aggregation_mode: oracle_filter_diagnostic

train:
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 8
  warmup_steps: 200
  grad_clip: 1.0
  device: auto
  lambda_contrastive: 0.0
  log_every: 50
  eval_every: 150

eval:
  max_new_tokens: 6
  batch_size: 128
  baselines:
    - core_only
    - random_memory
    - oracle_memory
