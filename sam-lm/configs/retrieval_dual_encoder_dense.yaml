# Dual encoder retriever for dense shared-slot dataset
run_name: dual_encoder_dense
seed: 42
data_dir: data/synthetic_dense
output_dir: experiments/exp_0_6/retrieval_dual_encoder

model:
  type: dual_encoder
  retriever_type: dual_encoder
  slot_dim: 256
  query_encoder:
    d_model: 256
    n_layers: 3
    n_heads: 4
    d_ff: 1024
    dropout: 0.0
    max_seq_len: 64

train:
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4
  epochs: 15
  warmup_steps: 300
  grad_clip: 1.0
  device: auto
  temperature: 0.05
  log_every: 40

eval:
  max_new_tokens: 6
  batch_size: 128
