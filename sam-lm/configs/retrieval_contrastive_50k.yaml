# Contrastive k-NN on 50K dataset
run_name: contrastive_50k
seed: 42
data_dir: data/synthetic
output_dir: experiments/exp_0_5/contrastive

model:
  type: contrastive
  retriever_type: contrastive
  query_encoder:
    d_model: 256
    n_layers: 3
    n_heads: 4
    d_ff: 1024
    dropout: 0.0
    max_seq_len: 64

train:
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4
  epochs: 15
  warmup_steps: 300
  grad_clip: 1.0
  device: auto
  temperature: 0.05
  log_every: 50
