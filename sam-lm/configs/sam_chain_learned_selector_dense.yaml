# SAM chain-set with learned slot selector
run_name: sam_chain_learned_selector_dense
seed: 42
data_dir: data/synthetic_dense
output_dir: experiments/exp_0_12/chain_learned_selector

model:
  type: sam
  mode: retrieved_memory_external_text_query
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_ff: 1536
  max_seq_len: 128
  dropout: 0.0
  memory_every: 3
  memory_query: tokenwise
  memory_integration: gated_sum
  memory:
    type: retrieved_external
    max_facts: 64
    fact_dim: 256
    num_subkeys: 64
    key_dim: 64
    value_dim: 128
    top_a: 8
    top_b: 8
    top_k: 8
    soft_candidates: false
    aggregation_mode: learned_selector
    selector_threshold: 0.5
    selector_positive_weight: 8.0
    selector_loss_weight: 1.0
    selector_use_hop_count: true
    selector_hidden_dim: 256
    retriever_query_dim: 256

retriever_backend: chain_set
retriever_checkpoint: experiments/exp_0_11/chain_set_bce/checkpoint.pt
topK: 64
memory_aggregation_mode: learned_selector
selector_threshold: 0.5
selector_positive_weight: 8.0
selector_loss_weight: 1.0
selector_use_hop_count: true

train:
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 8
  warmup_steps: 200
  grad_clip: 1.0
  device: auto
  lambda_contrastive: 0.0
  log_every: 50
  eval_every: 150

eval:
  max_new_tokens: 6
  batch_size: 128
  baselines:
    - core_only
    - random_memory
    - oracle_memory
