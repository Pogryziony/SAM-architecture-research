# Dense Transformer baseline (A0). Knowledge-in-weights (closed book).
# Target: ~20-50M params. Reported at runtime as parameter_count.
run_name: dense_tiny
seed: 42
data_dir: data/synthetic
output_dir: experiments/exp_000_dense_baseline

model:
  type: dense
  d_model: 512
  n_layers: 8
  n_heads: 8
  d_ff: 2048
  dropout: 0.0
  max_seq_len: 256
  # closed-book: facts are NOT in the prompt; the model must store them in weights.
  # The trainer mixes in fact-presentation sequences (knowledge injection) so a
  # dense model has the *opportunity* to memorise the KB. Set true for an
  # open-book upper-bound reference (facts concatenated into the prompt).
  open_book: false

train:
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 8
  max_steps: null
  warmup_steps: 200
  grad_clip: 1.0
  device: auto
  fact_injection_ratio: 0.5   # fraction of closed-book training batches drawn from raw facts
  log_every: 50
  eval_every: 500

eval:
  max_new_tokens: 6
  batch_size: 128
