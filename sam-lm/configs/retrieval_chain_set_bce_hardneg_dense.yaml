# Chain-set retriever with multi-positive BCE loss + structured hard negative mining
# Hard negatives: slots sharing entity/relation/type/family with required slots.
run_name: chain_set_bce_hardneg_dense
seed: 42
data_dir: data/synthetic_dense
output_dir: experiments/exp_0_11/chain_set_hardneg

model:
  type: chain_set_bce_hardneg
  retriever_type: chain_set_bce_hardneg
  slot_dim: 256
  query_encoder:
    d_model: 256
    n_layers: 3
    n_heads: 4
    d_ff: 1024
    dropout: 0.0
    max_seq_len: 64

train:
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4
  epochs: 15
  warmup_steps: 300
  grad_clip: 1.0
  device: auto
  temperature: 0.05
  log_every: 40
  negatives_per_positive: 16
  pos_weight: 5.0
  hard_negative_ratio: 0.5
  random_negative_ratio: 0.5

eval:
  max_new_tokens: 6
  batch_size: 128
