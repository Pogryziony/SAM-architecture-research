# Dense baseline on dense dataset (matching SAM 384 dim)
run_name: dense_tiny_dense
seed: 42
data_dir: data/synthetic_dense
output_dir: experiments/exp_0_6/dense_baseline
model:
  type: dense
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_ff: 1536
  dropout: 0.0
  max_seq_len: 256
  open_book: false
train:
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 0.01
  epochs: 8
  warmup_steps: 200
  grad_clip: 1.0
  device: auto
  fact_injection_ratio: 0.5
  log_every: 50
  eval_every: 150
eval:
  max_new_tokens: 6
  batch_size: 128
